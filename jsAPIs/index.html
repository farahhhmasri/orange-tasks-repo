<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="main-container">
      <div class="header">
        <div class="title">
          <i class="fa-brands fa-github"></i>
          <h2>GitHub Users <span>Viewer</span></h2>
        </div>
        <small
          >fetch data from the Github API and display users dynamically</small
        >
      </div>
      <div class="imgDiv">
        <hr />
        <img src="github-img.png" width="100%" height="50%" />
      </div>

      <div id="loadDiv">
        <span class="loadcontent">Loading users...</span>
      </div>

      <div class="text-div">
        <hr />
        <span>Users will appear here</span>
      </div>
      <input
        id="searchBar"
        type="text"
        class="search-bar"
        placeholder="search users"
      />
      <div id="cardscontainer" class="cardscontainer"></div>
    </div>
    <script src="task.js"></script>
  </body>
</html>
