<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task5</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <form>
            <h2>Sign Up</h2>
            <p>Please fill in this form to create an account!</p>
            <hr>
            <div class="inner-container">
                <input type="text" placeholder="  First Name" class="item">
                <input type="text" placeholder="  Last Name" class="item">
            </div>
            <div class="inner-container">
                <input type="email" placeholder="  Email" class="item">
            </div>
            <div class="inner-container">
                <input type="password" placeholder="  Password" class="item">
            </div>
            <div class="inner-container">
                <input type="password" placeholder="  Confirm Password" class="item">
            </div>
            <div class="inner-container">
                <input type="checkbox" value="accepted">
                <p>I accept the <span>Terms of Use</span> & <span>Privacy Policy.</span></p>
            </div>
            <input type="submit" value="Sign Up" class="button">            
            
        </form>
    </div>
    <p style="text-align: center; color: white;">Already have an account? <a href="#">Login here.</a></p>
    
</body>
</html>
