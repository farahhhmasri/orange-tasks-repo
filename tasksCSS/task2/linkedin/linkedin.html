<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task2 - Linkedin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<img src="media/linkedinBlue.png" width="100" height="40" alt="Linkedin Logo">


<!-- Form Structure-->
<div class="form-card">
    <form>
        <div style="margin:3px;">
            <h2>Sign in</h2>
            <p>stay updated on your professional world</p>
        </div>
        <div>
            <input type="text" placeholder="Email or Phone" class="text-style"> <br>
            <div style="position: relative;">
                <input type="password" placeholder="Password" class="text-style"> <br>
                <span class="show">show</span>
            </div>
            <a href="#" style="padding:10px 5px;">Forgot Password?</a><br><br>
        </div>
        <div>
            <input type="button" value="Sign in" style="background-color: #0a66c2; border-color: #0a66c2; color: white;" class="button-style">
            <div style="position: relative;">
                <span class="or">or</span>
                <hr>
            </div>
            <div style="position: relative;">
                <input type="button" value="Sign in with Apple" style="background-color: white;" class="button-style">
                <img src="media/appleLogo.png" width="25" height="25" alt="Apple Logo" class="apple">
            </div> 
        </div>
    </form>
</div>

<p style="text-align: center;">New to Linkedin? <a href="#">Join now</a></p>



<!-- Footer Structure-->
<div class="footer">
    <div class="bl-linkedin">
        <img src="media/LinkedinBlack.png" width="50" height="20" alt="Linkedin Logo"> 
        <span> &copy; 2021</span> 
    </div>
    <div><span>user agreement</span></div>
    <div><span>Privacy Policy</span></div>
    <div><span>Community Guidelines</span></div>
    <div><span>Cookie Policy</span></div>
    <div><span>Copyright Policy</span></div>
    <div><span>Send Feedback</span></div>
    <div><span>Language</span></div>
</div>

</body>
</html>
